[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.3.5 and < 6.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.0.2 and < 3.0.0"

[tools.lustre.bin]
bun = "system"

[tools.lustre.build]
minify = true

[tools.lustre.dev]
host = "0.0.0.0"
port = 8080

[tools.lustre.html]
title = "🚧 wiskiy"